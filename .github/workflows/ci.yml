name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "staging" ]
  pull_request:
    branches: [ "main", "develop", "staging" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml -DskipTests

    - name: Build Docker Image
      run: docker build -t sync-service:${{ github.sha }} .
      
    - name: Run Docker Container (Dry Run)
      run: |
        docker run -d -p 8080:8080 -e MONGO_URI="${{ secrets.MONGO_URI }}" --name test-app sync-service:${{ github.sha }}
        sleep 10
        docker logs test-app
